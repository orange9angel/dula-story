<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Comic Book Demo Render</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #08090d;
        font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif;
      }

      #stage {
        position: fixed;
        inset: 0;
      }

      #subtitle {
        display: none;
      }

      #bubbleLayer {
        position: fixed;
        inset: 0;
        pointer-events: none;
      }

      .bubble {
        position: absolute;
        box-sizing: border-box;
        min-height: 88px;
        padding: 18px 24px 20px;
        border: 5px solid #151515;
        border-radius: 36px;
        background: #fffaf0;
        color: #121212;
        font-size: 37px;
        font-weight: 800;
        line-height: 1.16;
        text-align: center;
        white-space: pre-line;
        letter-spacing: 0;
        filter: drop-shadow(0 7px 0 rgba(0, 0, 0, 0.32));
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.96);
      }

      .bubble.robot {
        border-color: #073644;
        background: #dffaff;
        color: #062832;
        border-radius: 28px;
      }

      .bubble.star {
        border-color: #3b2868;
        background: #fff2b7;
        color: #30204f;
      }

      .bubble::before,
      .bubble::after {
        content: "";
        position: absolute;
        width: 0;
        height: 0;
      }

      .bubble::before {
        border: 22px solid transparent;
      }

      .bubble::after {
        border: 14px solid transparent;
      }

      .bubble.tail-down::before {
        left: 50%;
        bottom: -47px;
        transform: translateX(-50%);
        border-top-color: #151515;
      }

      .bubble.tail-down::after {
        left: 50%;
        bottom: -29px;
        transform: translateX(-50%);
        border-top-color: #fffaf0;
      }

      .bubble.tail-down-left::before {
        left: 30%;
        bottom: -47px;
        transform: translateX(-50%) rotate(12deg);
        border-top-color: #151515;
      }

      .bubble.tail-down-left::after {
        left: 30%;
        bottom: -29px;
        transform: translateX(-50%) rotate(12deg);
        border-top-color: #fffaf0;
      }

      .bubble.tail-down-right::before {
        left: 70%;
        bottom: -47px;
        transform: translateX(-50%) rotate(-12deg);
        border-top-color: #151515;
      }

      .bubble.tail-down-right::after {
        left: 70%;
        bottom: -29px;
        transform: translateX(-50%) rotate(-12deg);
        border-top-color: #fffaf0;
      }

      .bubble.robot::before {
        border-top-color: #073644;
      }

      .bubble.robot::after {
        border-top-color: #dffaff;
      }

      .bubble.star::before {
        border-top-color: #3b2868;
      }

      .bubble.star::after {
        border-top-color: #fff2b7;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "/vendor/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <div id="stage"></div>
    <div id="subtitle"><span></span></div>
    <div id="bubbleLayer"></div>
    <script type="module" src="/render.js"></script>
  </body>
</html>
